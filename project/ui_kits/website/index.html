/* ── SHOP PAGE ───────────────────────────────────────────────────── */
function ShopPage({ onNavigate, onAddToCart, initialCategory }) {
  const [activeCat, setActiveCat] = React.useState(initialCategory || 'All');
  const [sort, setSort] = React.useState('featured');
  const [search, setSearch] = React.useState('');
  const [priceMax, setPriceMax] = React.useState(15000);

  React.useEffect(() => { if (initialCategory) setActiveCat(initialCategory); }, [initialCategory]);

  const filtered = PRODUCTS
    .filter(p => activeCat === 'All' || p.category === activeCat)
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.brand.toLowerCase().includes(search.toLowerCase()))
    .filter(p => p.price <= priceMax);

  const sorted = [...filtered].sort((a,b) => {
    if (sort==='price-asc') return a.price - b.price;
    if (sort==='price-desc') return b.price - a.price;
    if (sort==='rating') return b.rating - a.rating;
    return 0;
  });

  return (
    <div style={{ maxWidth:'1200px', margin:'0 auto', padding:'24px' }}>
      <div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'12px', color:'#6b7280', marginBottom:'20px', display:'flex', alignItems:'center', gap:'6px' }}>
        <span style={{ color:M, cursor:'pointer' }} onClick={() => onNavigate('home')}>Home</span>
        <Icon name="chevron-right" size={12} color="#9ca3af" />
        <span style={{ color:C, fontWeight:600 }}>Shop</span>
      </div>

      <div style={{ display:'flex', gap:'20px', alignItems:'flex-start' }}>
        {/* Sidebar filters */}
        <div style={{ width:'200px', flexShrink:0 }}>
          <div style={{ background:'#fff', borderRadius:'16px', padding:'18px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)', marginBottom:'12px' }}>
            <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:700, fontSize:'13px', color:C, marginBottom:'12px' }}>Categories</div>
            {CATEGORIES.map(cat => (
              <button key={cat} onClick={() => setActiveCat(cat)}
                style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px', borderRadius:'8px', border:'none', background: activeCat===cat ? '#f0faf2' : 'transparent', color: activeCat===cat ? C : '#374151', fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'12px', fontWeight: activeCat===cat ? 700 : 500, cursor:'pointer', marginBottom:'2px', textAlign:'left' }}>
                {cat}
                <span style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'10px', color:'#9ca3af' }}>
                  {cat==='All' ? PRODUCTS.length : PRODUCTS.filter(p=>p.category===cat).length}
                </span>
              </button>
            ))}
          </div>
          <div style={{ background:'#fff', borderRadius:'16px', padding:'18px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
            <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:700, fontSize:'13px', color:C, marginBottom:'12px' }}>Max Price</div>
            <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:'16px', color:C, marginBottom:'8px' }}>R{priceMax.toLocaleString()}</div>
            <input type="range" min={200} max={15000} step={500} value={priceMax} onChange={e => setPriceMax(+e.target.value)}
              style={{ width:'100%', accentColor:C }} />
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:'4px' }}>
              <span style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'10px', color:'#9ca3af' }}>R200</span>
              <span style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'10px', color:'#9ca3af' }}>R15,000</span>
            </div>
          </div>
        </div>

        {/* Main */}
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px', flexWrap:'wrap', gap:'10px' }}>
            <h1 style={{ fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:'24px', color:C }}>
              {activeCat === 'All' ? 'All Products' : activeCat}
            </h1>
            <div style={{ display:'flex', gap:'10px', alignItems:'center' }}>
              <div style={{ position:'relative' }}>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search…"
                  style={{ padding:'8px 36px 8px 12px', borderRadius:'20px', border:'2px solid #e8f5e9', background:'#f7fdf8', fontSize:'12px', color:C, outline:'none', width:'160px' }} />
                <span style={{ position:'absolute', right:'10px', top:'50%', transform:'translateY(-50%)', display:'flex' }}>
                  <Icon name="search" size={14} color={M} />
                </span>
              </div>
              <select value={sort} onChange={e => setSort(e.target.value)}
                style={{ padding:'8px 12px', borderRadius:'8px', border:'2px solid var(--kh-border)', fontSize:'12px', background:'white', color:'#374151', outline:'none' }}>
                <option value="featured">Featured</option>
                <option value="price-asc">Price ↑</option>
                <option value="price-desc">Price ↓</option>
                <option value="rating">Best Rated</option>
              </select>
            </div>
          </div>
          <div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'12px', color:'#6b7280', marginBottom:'14px' }}>
            {sorted.length} product{sorted.length!==1?'s':''} found
          </div>
          {sorted.length > 0 ? (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'14px' }}>
              {sorted.map(p => <KHProductCard key={p.id} product={p} onAddToCart={onAddToCart} onNavigate={onNavigate} />)}
            </div>
          ) : (
            <div style={{ textAlign:'center', padding:'64px 24px', background:'white', borderRadius:'16px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
              <Icon name="search" size={40} color="#d1d5db" />
              <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:700, fontSize:'18px', color:C, marginTop:'12px', marginBottom:'6px' }}>No products found</div>
              <div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'13px', color:'#6b7280' }}>Try adjusting filters or search</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── PRODUCT DETAIL ──────────────────────────────────────────────── */

/* ── CART PAGE ───────────────────────────────────────────────────── */

                <div style={{ background:'#fde68a', borderRadius:'6px', height:'6px', overflow:'hidden' }}>
                  <div style={{ height:'100%', width:`${Math.min(100,(subtotal/750)*100)}%`, background:'#f59e0b', borderRadius:'6px', transition:'width 0.4s ease' }} />

            Sign In <Icon name="arrow-right" size={16} color="#fff" />
          </button>
          <div style={{ textAlign:'center', fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'12px', color:'#9ca3af' }}>Any email + 4+ char password to demo</div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth:'1100px', margin:'0 auto', padding:'24px 24px 48px' }}>
      <div style={{ display:'flex', gap:'20px', alignItems:'flex-start' }}>
        <div style={{ width:'220px', flexShrink:0, display:'flex', flexDirection:'column', gap:'12px' }}>
          <div style={{ background:'white', borderRadius:'16px', padding:'20px', textAlign:'center', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
            <div style={{ width:'60px', height:'60px', background:`linear-gradient(135deg,${L},${C})`, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 10px' }}>
              <Icon name="user" size={26} color="#fff" />
            </div>
            <div style={{ fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:'15px', color:C }}>Qaasim</div>
            <div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'11px', color:'#6b7280', marginTop:'2px' }}>{email || 'customer@kiwihub.co.za'}</div>
            <div style={{ background:'#f0faf2', borderRadius:'8px', padding:'4px 10px', fontSize:'11px', fontFamily:"'Plus Jakarta Sans', sans-serif", fontWeight:600, color:C, marginTop:'8px', display:'inline-block' }}>🥝 KiwiHub Member</div>
          </div>
          <div style={{ background:'white', borderRadius:'16px', padding:'8px', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                style={{ width:'100%', display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'10px', border:'none', background: activeTab===tab.id ? '#f0faf2' : 'transparent', color: activeTab===tab.id ? C : '#374151', fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'13px', fontWeight: activeTab===tab.id ? 700 : 500, cursor:'pointer', textAlign:'left', marginBottom:'2px' }}>

              <Icon name="arrow-left" size={14} color="#dc2626" /> Sign Out

          </div>
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          {activeTab==='dashboard' && (
            <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
              <h1 style={{ fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:'24px', color:C }}>Welcome back! 👋</h1>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px' }}>
                {[{icon:'package',label:'Total Orders',value:3},{icon:'truck',label:'In Transit',value:1},{icon:'check',label:'Delivered',value:1},{icon:'heart',label:'Wishlist',value:5}].map(s => (
                  <div key={s.label} style={{ background:'white', borderRadius:'14px', padding:'16px', textAlign:'center', boxShadow:'0 2px 8px rgba(0,0,0,0.06)' }}>
                    <div style={{ width:'40px', height:'40px', background:'#f0faf2', borderRadius:'10px', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 8px' }}>
                      <Icon name={s.icon} size={20} color={C} />

                    <div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'11px', color:'#6b7280' }}>{s.label}</div>

                  <div><div style={{ fontFamily:"'Syne', sans-serif", fontWeight:700, fontSize:'14px', color:'#1a1a1a' }}>KH-482910</div><div style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontSize:'12px', color:'#6b7280' }}>18 Mar 2026 · 2 items</div></div>

}

/* ── APP ROOT ─────────────────────────────────────────────────────── */
function App() {
  const [page, setPage] = React.useState('home');
  const [pageData, setPageData] = React.useState(null);
  const [cart, setCart] = React.useState([]);

  const navigate = (p, data) => {
    setPage(p); setPageData(data || null);
    window.scrollTo({ top:0 });
  };

  const addToCart = (product, qty=1) => {
    setCart(c => {
      const ex = c.find(i => i.id===product.id);
      if (ex) return c.map(i => i.id===product.id ? { ...i, qty:i.qty+qty } : i);
      return [...c, { ...product, qty }];
    });
  };
  const updateQty = (id, delta) => setCart(c => c.map(i => i.id===id ? { ...i, qty:Math.max(1, i.qty+delta) } : i));
  const removeItem = (id) => setCart(c => c.filter(i => i.id!==id));
  const cartCount = cart.reduce((s,i) => s+i.qty, 0);

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', background:'var(--kh-bg)' }}>
      <KHNavbar cartCount={cartCount} currentPage={page} onNavigate={navigate} onCartClick={() => navigate('cart')} />
      <div style={{ flex:1 }}>
        {page==='home'    && <HomePage onNavigate={navigate} onAddToCart={addToCart} />}
        {page==='shop'    && <ShopPage onNavigate={navigate} onAddToCart={addToCart} initialCategory={pageData?.category} />}
        {page==='product' && <ProductPage product={pageData} onNavigate={navigate} onAddToCart={addToCart} />}
        {page==='cart'    && <CartPage cartItems={cart} onUpdateQty={updateQty} onRemove={removeItem} onNavigate={navigate} />}
        {page==='account' && <AccountPage onNavigate={navigate} />}
        {page==='contact' && <ContactPage onNavigate={navigate} />}
        {page==='faqs'    && <FaqsPage onNavigate={navigate} />}
        {page==='returns' && <ReturnsPage onNavigate={navigate} />}
        {page==='about'   && <AboutPage onNavigate={navigate} />}
        {page==='tracking'&& <TrackingPage onNavigate={navigate} />}
      </div>
      <KHFooter onNavigate={navigate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
