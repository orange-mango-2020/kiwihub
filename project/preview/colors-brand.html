<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f0; padding: 20px; display: flex; gap: 12px; }
  .swatch { border-radius: 12px; overflow: hidden; flex: 1; min-width: 90px; }
  .color { height: 80px; }
  .info { background: white; padding: 10px 12px; }
  .name { font-size: 11px; font-weight: 600; color: #1a1a1a; }
  .hex  { font-size: 10px; color: #6b7280; margin-top: 2px; font-family: monospace; }
  .role { font-size: 9px; color: #9ca3af; margin-top: 2px; }
</style>
</head><body>
  <div class="swatch">
    <div class="color" style="background:#1a4a2e;"></div>
    <div class="info"><div class="name">Deep Green</div><div class="hex">#1a4a2e</div><div class="role">Primary / Buttons</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#40916c;"></div>
    <div class="info"><div class="name">Mid Green</div><div class="hex">#40916c</div><div class="role">Links / Accents</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#5cb85c;"></div>
    <div class="info"><div class="name">Light Green</div><div class="hex">#5cb85c</div><div class="role">Badge / Progress</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#2d6a4f;"></div>
    <div class="info"><div class="name">Hover Green</div><div class="hex">#2d6a4f</div><div class="role">Button Hover</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:linear-gradient(135deg,#5cb85c,#1a4a2e);"></div>
    <div class="info"><div class="name">Logo Gradient</div><div class="hex">5cb85c→1a4a2e</div><div class="role">Logo Mark</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:linear-gradient(135deg,#1a4a2e,#40916c);"></div>
    <div class="info"><div class="name">Hero Gradient</div><div class="hex">1a4a2e→40916c</div><div class="role">Hero Section</div></div>
  </div>
</body></html>
