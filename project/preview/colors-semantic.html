<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f0; padding: 20px; display: flex; gap: 10px; }
  .group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .chip { border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
  .chip-name { font-size: 11px; font-weight: 700; }
  .chip-hex  { font-size: 9px; font-family: monospace; opacity: 0.75; }
</style>
</head><body>
  <div class="group">
    <div class="label">Success</div>
    <div class="chip" style="background:#d1fae5; color:#059669;"><span class="chip-name">✓ Verified / In Stock</span><span class="chip-hex">#059669</span></div>
    <div class="chip" style="background:#d1fae5; color:#065f46;"><span class="chip-name">Background</span><span class="chip-hex">#d1fae5</span></div>
  </div>
  <div class="group">
    <div class="label">Warning</div>
    <div class="chip" style="background:#fef3c7; color:#92400e;"><span class="chip-name">★ Star Ratings</span><span class="chip-hex">#f59e0b</span></div>
    <div class="chip" style="background:#fef3c7; color:#92400e;"><span class="chip-name">Delivery Progress</span><span class="chip-hex">#fef3c7</span></div>
  </div>
  <div class="group">
    <div class="label">Error</div>
    <div class="chip" style="background:#fef2f2; color:#dc2626;"><span class="chip-name">✕ Out of Stock</span><span class="chip-hex">#dc2626</span></div>
    <div class="chip" style="background:#fee2e2; color:#dc2626;"><span class="chip-name">Cancelled</span><span class="chip-hex">#fee2e2</span></div>
  </div>
  <div class="group">
    <div class="label">Info / Discount</div>
    <div class="chip" style="background:#dbeafe; color:#2563eb;"><span class="chip-name">In Transit</span><span class="chip-hex">#2563eb</span></div>
    <div class="chip" style="background:#ef4444; color:#fff;"><span class="chip-name">HOT DEAL / −%</span><span class="chip-hex">#ef4444</span></div>
  </div>
</body></html>
