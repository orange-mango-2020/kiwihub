<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #e5e7eb; padding: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { border-radius: 10px; overflow: hidden; width: calc(25% - 8px); min-width: 100px; border: 1px solid #e5e7eb; }
  .color { height: 56px; }
  .info { background: white; padding: 8px 10px; }
  .name { font-size: 10px; font-weight: 600; color: #1a1a1a; }
  .hex  { font-size: 9px; color: #6b7280; margin-top: 1px; font-family: monospace; }
  .role { font-size: 9px; color: #9ca3af; margin-top: 1px; }
</style>
</head><body>
  <div class="swatch"><div class="color" style="background:#f7f5f0;"></div><div class="info"><div class="name">Cream BG</div><div class="hex">#f7f5f0</div><div class="role">Page background</div></div></div>
  <div class="swatch"><div class="color" style="background:#ffffff; border-bottom:1px solid #f0f0f0;"></div><div class="info"><div class="name">Card White</div><div class="hex">#ffffff</div><div class="role">All cards/panels</div></div></div>
  <div class="swatch"><div class="color" style="background:#f0faf2;"></div><div class="info"><div class="name">Green Light BG</div><div class="hex">#f0faf2</div><div class="role">Image wells, price</div></div></div>
  <div class="swatch"><div class="color" style="background:#e8f5e9;"></div><div class="info"><div class="name">Green Tint</div><div class="hex">#e8f5e9</div><div class="role">Search bg, chips</div></div></div>
  <div class="swatch"><div class="color" style="background:#c8f5d8;"></div><div class="info"><div class="name">Mint</div><div class="hex">#c8f5d8</div><div class="role">Light accents</div></div></div>
  <div class="swatch"><div class="color" style="background:#1a4a2e;"></div><div class="info"><div class="name">Announce BG</div><div class="hex">#1a4a2e</div><div class="role">Top bar bg</div></div></div>
  <div class="swatch"><div class="color" style="background:#e5e7eb;"></div><div class="info"><div class="name">Border</div><div class="hex">#e5e7eb</div><div class="role">Default borders</div></div></div>
  <div class="swatch"><div class="color" style="background:linear-gradient(135deg,#f0faf2,#e8f5e9);"></div><div class="info"><div class="name">Image Well</div><div class="hex">Gradient</div><div class="role">Product thumbnails</div></div></div>
</body></html>
