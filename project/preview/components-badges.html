<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f0; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .divider { height: 1px; background: #e8f5e9; }
  .label { font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head><body>
  <div class="label">Order Status Badges</div>
  <div class="row">
    <span style="background:#d1fae5;color:#059669;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;">Delivered</span>
    <span style="background:#dbeafe;color:#2563eb;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;">In Transit</span>
    <span style="background:#fef3c7;color:#92400e;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;">Processing</span>
    <span style="background:#fee2e2;color:#dc2626;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;">Cancelled</span>
  </div>
  <div class="divider"></div>
  <div class="label">Product / Trust Badges</div>
  <div class="row">
    <span style="background:#ef4444;color:#fff;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;">HOT DEAL</span>
    <span style="background:#d1fae5;color:#059669;border-radius:6px;padding:2px 8px;font-size:9px;font-weight:700;">✓ Verified</span>
    <span style="background:#f0faf2;color:#1a4a2e;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;">🥝 KiwiHub Member</span>
    <span style="background:#1a4a2e;color:#c8f5d8;border-radius:8px;padding:3px 10px;font-size:10px;font-weight:700;">Default</span>
  </div>
  <div class="divider"></div>
  <div class="label">Delivery / Trust Chips</div>
  <div class="row">
    <div style="background:white;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
      <span>🚚</span><div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:#1a4a2e;">Free Delivery</div><div style="font-size:10px;color:#6b7280;">Orders over R750</div></div>
    </div>
    <div style="background:white;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
      <span>🔒</span><div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:#1a4a2e;">Secure Payment</div><div style="font-size:10px;color:#6b7280;">PayFast</div></div>
    </div>
    <div style="background:white;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
      <span>🔄</span><div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:#1a4a2e;">30-Day Returns</div><div style="font-size:10px;color:#6b7280;">Hassle-free</div></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="label">Color Swatches (Product Options)</div>
  <div class="row">
    <button style="background:#fff;border:2.5px solid #1a4a2e;border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;color:#1a4a2e;cursor:pointer;">Space Grey</button>
    <button style="background:#fff;border:2px solid #e5e7eb;border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;color:#374151;cursor:pointer;">Arctic White</button>
    <button style="background:#fff;border:2px solid #e5e7eb;border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;color:#374151;cursor:pointer;">Midnight Blue</button>
  </div>
</body></html>
