<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f0; padding: 20px; display: flex; gap: 14px; }
  .card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 1; min-width: 120px; }
</style>
</head><body>
  <!-- Standard product card -->
  <div class="card">
    <div style="background:linear-gradient(135deg,#f0faf2,#e8f5e9);height:110px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;">
      💻
      <div style="position:absolute;top:10px;left:10px;background:#ef4444;color:#fff;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;">HOT DEAL</div>
    </div>
    <div style="padding:12px 14px;">
      <div style="font-size:9px;color:#40916c;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Lenovo · Laptops</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:6px;line-height:1.3;">IdeaPad 3 Laptop</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px;">
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#1a4a2e;">R8,999</span>
        <span style="font-size:11px;color:#9ca3af;text-decoration:line-through;">R10,499</span>
        <span style="background:#ef4444;color:#fff;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;">-14%</span>
      </div>
      <button style="width:100%;background:#f0faf2;color:#1a4a2e;border:2px solid #c8f5d8;border-radius:8px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;">+ Add to Cart</button>
    </div>
  </div>

  <!-- Hovered card -->
  <div class="card" style="transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1);">
    <div style="background:linear-gradient(135deg,#f0faf2,#e8f5e9);height:110px;display:flex;align-items:center;justify-content:center;font-size:48px;">🖱️</div>
    <div style="padding:12px 14px;">
      <div style="font-size:9px;color:#40916c;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Logitech · Accessories</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:6px;line-height:1.3;">Wireless Mouse</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px;">
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#1a4a2e;">R349</span>
        <span style="font-size:11px;color:#9ca3af;text-decoration:line-through;">R499</span>
      </div>
      <button style="width:100%;background:#f0faf2;color:#1a4a2e;border:2px solid #c8f5d8;border-radius:8px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;">+ Add to Cart</button>
    </div>
  </div>

  <!-- Out of stock -->
  <div class="card" style="opacity:0.85;">
    <div style="background:linear-gradient(135deg,#f0faf2,#e8f5e9);height:110px;display:flex;align-items:center;justify-content:center;font-size:48px;">🔌</div>
    <div style="padding:12px 14px;">
      <div style="font-size:9px;color:#40916c;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Samsung · Accessories</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:4px;line-height:1.3;">USB-C Hub</div>
      <div style="font-size:11px;font-weight:600;color:#dc2626;margin-bottom:8px;">✕ Out of Stock</div>
      <button style="width:100%;background:#f7f5f0;color:#9ca3af;border:1.5px solid #e5e7eb;border-radius:8px;padding:7px;font-size:11px;font-weight:700;cursor:not-allowed;font-family:'Syne',sans-serif;" disabled>Unavailable</button>
    </div>
  </div>
</body></html>
