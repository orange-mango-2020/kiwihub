<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f0; padding: 20px; }
  .scale { display: flex; flex-direction: column; gap: 0; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid #e8f5e9; }
  .token { font-size: 9px; font-family: monospace; color: #9ca3af; min-width: 60px; }
  .px { font-size: 9px; color: #6b7280; min-width: 28px; }
  .bar { background: #1a4a2e; border-radius: 2px; height: 10px; }
</style>
</head><body>
  <div class="scale">
    <div class="row"><div class="token">--space-1</div><div class="px">4px</div><div class="bar" style="width:4px;"></div></div>
    <div class="row"><div class="token">--space-2</div><div class="px">6px</div><div class="bar" style="width:6px;"></div></div>
    <div class="row"><div class="token">--space-3</div><div class="px">8px</div><div class="bar" style="width:8px;"></div></div>
    <div class="row"><div class="token">--space-4</div><div class="px">10px</div><div class="bar" style="width:10px;"></div></div>
    <div class="row"><div class="token">--space-5</div><div class="px">12px</div><div class="bar" style="width:12px;"></div></div>
    <div class="row"><div class="token">--space-6</div><div class="px">14px</div><div class="bar" style="width:14px;"></div></div>
    <div class="row"><div class="token">--space-7</div><div class="px">16px</div><div class="bar" style="width:16px;"></div></div>
    <div class="row"><div class="token">--space-8</div><div class="px">20px</div><div class="bar" style="width:20px;"></div></div>
    <div class="row"><div class="token">--space-9</div><div class="px">24px</div><div class="bar" style="width:24px;"></div></div>
    <div class="row"><div class="token">--space-10</div><div class="px">28px</div><div class="bar" style="width:28px;"></div></div>
    <div class="row"><div class="token">--space-11</div><div class="px">32px</div><div class="bar" style="width:32px;"></div></div>
    <div class="row"><div class="token">--space-12</div><div class="px">40px</div><div class="bar" style="width:40px;"></div></div>
    <div class="row"><div class="token">--space-13</div><div class="px">48px</div><div class="bar" style="width:48px;"></div></div>
    <div class="row"><div class="token">--space-14</div><div class="px">56px</div><div class="bar" style="width:56px;"></div></div>
    <div class="row"><div class="token">--space-15</div><div class="px">64px</div><div class="bar" style="width:64px;"></div></div>
  </div>
</body></html>
