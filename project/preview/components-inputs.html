<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f7f5f0; padding: 20px; display: flex; gap: 24px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .label { font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; width: 100%; outline: none; }
</style>
</head><body>
  <div class="col">
    <div class="label">Input States</div>
    <div>
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Default</div>
      <input style="padding:10px 14px;border-radius:10px;border:1.5px solid #e5e7eb;color:#1a1a1a;background:#fff;" placeholder="Enter your email…" />
    </div>
    <div>
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Focus</div>
      <input style="padding:10px 14px;border-radius:10px;border:1.5px solid #5cb85c;color:#1a1a1a;background:#fff;" value="you@email.com" />
    </div>
    <div>
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Error</div>
      <input style="padding:10px 14px;border-radius:10px;border:1.5px solid #fca5a5;color:#1a1a1a;background:#fff8f8;" value="invalid-email" />
      <div style="font-size:11px;color:#dc2626;margin-top:3px;">Valid email required</div>
    </div>
    <div>
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Success (Coupon)</div>
      <input style="padding:10px 14px;border-radius:10px;border:1.5px solid #6ee7b7;color:#1a1a1a;background:#f0fdf4;" value="KIWI10" />
      <div style="font-size:11px;color:#059669;font-weight:600;margin-top:3px;">✓ KIWI10 applied — 10% off!</div>
    </div>
  </div>
  <div class="col">
    <div class="label">Search + Select</div>
    <div style="position:relative;">
      <input style="padding:9px 40px 9px 16px;border-radius:24px;border:2px solid #e8f5e9;background:#f7fdf8;color:#1a4a2e;width:100%;" placeholder="Search products..." />
      <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:#40916c;">🔍</span>
    </div>
    <div style="margin-top:4px;">
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;">Province Select</div>
      <select style="padding:10px 14px;border-radius:10px;border:1.5px solid #e5e7eb;color:#1a1a1a;background:#fff;width:100%;">
        <option>Free State</option>
        <option>Gauteng</option>
        <option>KwaZulu-Natal</option>
      </select>
    </div>
    <div style="margin-top:4px;">
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;">Quantity Control</div>
      <div style="display:flex;align-items:center;background:white;border-radius:10px;border:2px solid #e5e7eb;width:fit-content;">
        <button style="background:none;border:none;width:40px;height:40px;font-size:18px;cursor:pointer;color:#374151;border-radius:8px 0 0 8px;font-family:'Plus Jakarta Sans',sans-serif;">−</button>
        <span style="padding:0 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#1a4a2e;">2</span>
        <button style="background:none;border:none;width:40px;height:40px;font-size:18px;cursor:pointer;color:#374151;border-radius:0 8px 8px 0;font-family:'Plus Jakarta Sans',sans-serif;">+</button>
      </div>
    </div>
    <div style="margin-top:4px;">
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;">Checkbox</div>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
        <input type="checkbox" checked style="accent-color:#1a4a2e;width:16px;height:16px;" />
        <span style="font-size:13px;color:#374151;">Save this address for future orders</span>
      </label>
    </div>
  </div>
</body></html>
